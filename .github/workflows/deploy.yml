name: Deploy B2B Cloud Platform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the project directory on EC2
            cd /home/ubuntu/srilaxmiindustries.com || exit 1

            # Fetch the latest code from GitHub
            git reset --hard HEAD
            git pull origin main

            # Recreate the production .env file using GitHub Secrets
            echo "DB_USER=${{ secrets.DB_USER }}" > .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
            echo "ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}" >> .env
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
            echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env
            echo "S3_UPLOAD_BUCKET=${{ secrets.S3_UPLOAD_BUCKET }}" >> .env
            echo "S3_BACKUP_BUCKET=${{ secrets.S3_BACKUP_BUCKET }}" >> .env
            echo "SES_FROM_EMAIL=${{ secrets.SES_FROM_EMAIL }}" >> .env
            echo "SES_TO_EMAIL=${{ secrets.SES_TO_EMAIL }}" >> .env
            echo "DATADOG_API_KEY=${{ secrets.DATADOG_API_KEY }}" >> .env

            # Build and launch the container stack in detached mode
            docker compose down
            docker compose up -d --build

            # Perform a deployment health check against the health endpoint
            echo "Waiting for the backend service to stabilize..."
            sleep 10
            
            # Query /health and check if server responds with 200 OK
            if curl -s -f http://localhost:3000/health; then
              echo "Deployment health check passed! B2B platform is UP."
            else
              echo "ERROR: Health check failed! Rolling back/stopping containers..."
              docker compose logs backend
              exit 1
            fi
